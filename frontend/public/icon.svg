<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f1e2e"/>
    </linearGradient>
    <linearGradient id="hubGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <radialGradient id="hubGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="12" ry="12" fill="url(#bgGrad)"/>

  <!-- Connection lines from hub to satellites -->
  <g stroke="#5eead4" stroke-width="1.5" stroke-linecap="round" opacity="0.7">
    <line x1="32" y1="32" x2="16" y2="16"/>
    <line x1="32" y1="32" x2="48" y2="16"/>
    <line x1="32" y1="32" x2="48" y2="48"/>
    <line x1="32" y1="32" x2="16" y2="48"/>
    <line x1="32" y1="32" x2="32" y2="10"/>
    <line x1="32" y1="32" x2="32" y2="54"/>
  </g>

  <!-- Hub glow -->
  <circle cx="32" cy="32" r="12" fill="url(#hubGlow)"/>

  <!-- Satellite nodes -->
  <g fill="#5eead4">
    <circle cx="16" cy="16" r="3.5"/>
    <circle cx="48" cy="16" r="3.5"/>
    <circle cx="48" cy="48" r="3.5"/>
    <circle cx="16" cy="48" r="3.5"/>
    <circle cx="32" cy="10" r="3"/>
    <circle cx="32" cy="54" r="3"/>
  </g>

  <!-- Central hub -->
  <circle cx="32" cy="32" r="6.5" fill="url(#hubGrad)" stroke="#0f1e2e" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="2" fill="#0f1e2e"/>
</svg>
